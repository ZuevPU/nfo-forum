app = 'nfo-forum-api'
primary_region = 'ams'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3001'
  SKIP_VK_SIGN = 'false'
  FRONTEND_ORIGIN = 'https://vk.com'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
