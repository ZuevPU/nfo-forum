*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,&#39;Segoe UI&#39;,sans-serif;background:#dde0ea;padding:32px;color:#1a1a2e;}

.app-hdr .an{font-size:11.5px;font-weight:700;color:#1a1a2e;}

/* BOTTOM NAV */

/* HOME */

.hic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}

.etag{font-size:8px;border-radius:4px;padding:1px 7px;display:inline-block;margin-top:3px;}
.tag-gen{background:#e2f8f3;color:#0f6e56;}
.tag-trk{background:#e8eaff;color:#3b4ec0;}
.tag-now{background:#3bbfa0;color:#fff;font-weight:700;}

/* EXCHANGE */
.ex-hdr{background:linear-gradient(135deg,#3b4ec0,#6b5ecf);padding:13px 14px;}
.ex-hdr .t{font-size:14px;font-weight:700;color:#fff;}
.ex-hdr .s{font-size:9.5px;color:rgba(255,255,255,.75);margin-top:2px;}

.ex-card{background:#fff;border-radius:12px;padding:11px 13px;}

/* QUESTIONS */

/* ── TIMELINE STYLES (namespaced) ── */
.tl-wrap {}

*{box-sizing:border-box;margin:0;padding:0;}

.tl-wrap .timeline{display:flex;flex-direction:column;gap:0;max-width:720px;}

.tl-wrap .titem{display:flex;gap:0;align-items:stretch;}

.t-left{display:flex;flex-direction:column;align-items:center;width:72px;flex-shrink:0;}
.t-time{font-size:11px;font-weight:700;color:#555;min-height:22px;display:flex;align-items:center;white-space:nowrap;}

.t-status.silent-s{color:#bbb;}
.t-desc{font-size:12px;color:#666;line-height:1.6;margin-top:7px;}

.t-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}

.tag.green{background:#e0f5ef;color:#0f6e56;}
.tag.orange{background:#fff4e0;color:#c27000;}

.ic-lunch{background:#ede9fe;}
.ic-rec{background:#fff7ed;}
.ic-eve{background:#f0fdf4;}
.ic-ref{background:#eef2ff;}

.t-divider{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.1em;margin:8px 0 8px 88px;}

.leg-dot{width:10px;height:10px;border-radius:50%;}
.leg-dot.active{background:#d97706;}
.leg-dot.silent{background:#ccc;}
