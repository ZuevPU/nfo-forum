name: NFO Forum Cron

on:
  schedule:
    - cron: '0 5 * * *'    # 08:00 MSK morning-greeting
    - cron: '30 5 * * *'   # 08:30 MSK morning-checkin
    - cron: '0 6 * * *'    # 09:00 MSK daily-tasks
    - cron: '15 10 * * *'  # 13:15 MSK lunch-exchange
    - cron: '30 16 * * *'  # 19:30 MSK evening-reflection
    - cron: '0 17 * * *'   # 20:00 MSK goodnight
    - cron: '0 11 * * *'   # 14:00 MSK trainer-diagnostics
    - cron: '*/5 * * * *'  # every 5 min — event-reminders + scheduled-broadcasts
  workflow_dispatch:
    inputs:
      job_name:
        description: Cron job to trigger
        required: true
        type: choice
        options:
          - morning-greeting
          - morning-checkin
          - daily-tasks
          - lunch-exchange
          - evening-reflection
          - goodnight
          - trainer-diagnostics
          - event-reminders
          - scheduled-broadcasts
          - reflection-publish
          - dynamic-slots

jobs:
  morning-greeting:
    if: github.event.schedule == '0 5 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'morning-greeting')
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.API_URL }}/api/cron/morning-greeting" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"

  morning-checkin:
    if: github.event.schedule == '30 5 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'morning-checkin')
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.API_URL }}/api/cron/morning-checkin" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"

  daily-tasks:
    if: github.event.schedule == '0 6 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'daily-tasks')
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.API_URL }}/api/cron/daily-tasks" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"

  lunch-exchange:
    if: github.event.schedule == '15 10 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'lunch-exchange')
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.API_URL }}/api/cron/lunch-exchange" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"

  evening-reflection:
    if: github.event.schedule == '30 16 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'evening-reflection')
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.API_URL }}/api/cron/evening-reflection" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"

  goodnight:
    if: github.event.schedule == '0 17 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'goodnight')
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.API_URL }}/api/cron/goodnight" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"

  trainer-diagnostics:
    if: github.event.schedule == '0 11 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'trainer-diagnostics')
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.API_URL }}/api/cron/trainer-diagnostics" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"

  event-reminders:
    if: github.event.schedule == '*/5 * * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'event-reminders')
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.API_URL }}/api/cron/event-reminders" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"

  scheduled-broadcasts:
    if: github.event.schedule == '*/5 * * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'scheduled-broadcasts')
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.API_URL }}/api/cron/scheduled-broadcasts" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"

  reflection-publish:
    if: github.event.schedule == '*/5 * * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'reflection-publish')
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.API_URL }}/api/cron/reflection-publish" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"

  dynamic-slots:
    if: github.event.schedule == '*/5 * * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'dynamic-slots')
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.API_URL }}/api/cron/dynamic-slots" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"
