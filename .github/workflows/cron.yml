            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}")
          cat cron_response.json
          echo "HTTP $HTTP_CODE"
          test "$HTTP_CODE" -lt 400

  goodnight:
    if: github.event.schedule == '0 17 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'goodnight')
    runs-on: ubuntu-latest
    steps:
      - run: |
          URL="${{ secrets.API_URL }}/api/cron/goodnight"
