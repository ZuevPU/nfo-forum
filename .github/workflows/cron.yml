            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}")
          cat cron_response.json
          echo "HTTP $HTTP_CODE"
          test "$HTTP_CODE" -lt 400

  trainer-diagnostics:
    if: github.event.schedule == '0 11 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'trainer-diagnostics')
    runs-on: ubuntu-latest
    steps:
      - run: |
          URL="${{ secrets.API_URL }}/api/cron/trainer-diagnostics"
          HTTP_CODE=$(curl -sS -o cron_response.json -w "%{http_code}" -X POST "$URL" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}")
          cat cron_response.json
          echo "HTTP $HTTP_CODE"
          test "$HTTP_CODE" -lt 400

  event-reminders:
    if: github.event.schedule == '*/5 * * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'event-reminders')
    runs-on: ubuntu-latest
    steps:
      - run: |
          URL="${{ secrets.API_URL }}/api/cron/event-reminders"
