name: NFO Forum Cron

on:
  schedule:
    - cron: '0 5 * * *'    # 08:00 MSK morning-greeting
    - cron: '0 6 * * *'    # 09:00 MSK daily-tasks
    - cron: '0 17 * * *'   # 20:00 MSK goodnight
    - cron: '0 11 * * *'   # 14:00 MSK trainer-diagnostics
    - cron: '*/5 * * * *'  # every 5 min — event-reminders + scheduled-broadcasts
  workflow_dispatch:
    inputs:
      job_name:
        description: Cron job to trigger
        required: true
        type: choice
        options:
          - morning-greeting
          - daily-tasks
          - goodnight
          - trainer-diagnostics
          - event-reminders
          - scheduled-broadcasts
          - reflection-publish
          - dynamic-slots

jobs:
  morning-greeting:
    if: github.event.schedule == '0 5 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'morning-greeting')
    runs-on: ubuntu-latest
    steps:
      - run: |
          URL="${{ secrets.API_URL }}/api/cron/morning-greeting"
          HTTP_CODE=$(curl -sS -o cron_response.json -w "%{http_code}" -X POST "$URL" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}")
          cat cron_response.json
          echo "HTTP $HTTP_CODE"
          test "$HTTP_CODE" -lt 400

  daily-tasks:
    if: github.event.schedule == '0 6 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'daily-tasks')
    runs-on: ubuntu-latest
    steps:
      - run: |
          URL="${{ secrets.API_URL }}/api/cron/daily-tasks"
